# cargo-deny configuration — dependency vetting gate (see docs/02-test-harness.md).
# Checks: security advisories, license policy, banned/duplicate crates, sources.
# Run locally with: cargo deny check

[advisories]
# RustSec advisory DB; fail on any vulnerability affecting our tree.
version = 2
# `unmaintained` advisories (not vulnerabilities) on dev-only transitive deps of
# `iai-callgrind` (the FR-7.5 instruction-count bench). Never shipped in the
# binary or wasm; benchmarking tooling only. Revisit when iai-callgrind updates.
ignore = [
    "RUSTSEC-2025-0141", # bincode 1.x unmaintained (via iai-callgrind/criterion)
    "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained (via iai-callgrind macros)
]

[licenses]
version = 2
# Permissive licenses common in the Rust ecosystem; extend deliberately, in PR.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]

[bans]
# Warn (don't fail) on duplicate crate versions for now; revisit if the tree grows.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
