# CI gate sequence — see docs/02-test-harness.md §CI for rationale.
# Gates run fastest-first: fmt -> clippy -> tests (nextest) -> doctests -> deny.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Snapshot tests must fail in CI if output drifts; never write .snap.new noise.
  INSTA_UPDATE: "no"

jobs:
  lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The core must stay portable (terminal frontend targets all three).
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Tests (unit + integration + e2e)
        run: cargo nextest run --workspace
      - name: Doctests (nextest does not run these)
        run: cargo test --workspace --doc

  features:
    name: Feature matrix (NFR-12)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every feature combination must pass the full suite incl. golden frames.
        # The parallel and SIMD paths are asserted byte-identical to scalar
        # (FR-6.3 / FR-7.4), so the same goldens hold under all of them.
        features:
          ["--no-default-features", "", "--features parallel", "--features simd", "--features parallel,simd"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (tte-core ${{ matrix.features }})
        run: cargo test -p tte-core ${{ matrix.features }}

  wasm:
    name: WASM frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen
      - name: Build wasm artifact (size-optimized)
        run: cargo build -p tte-wasm --profile release-wasm --target wasm32-unknown-unknown
      - name: Smoke test in Node (wasm-bindgen-test)
        run: cargo test -p tte-wasm --target wasm32-unknown-unknown
      - name: Generate bindings + check size budget (NFR-7)
        run: ./web/build.sh

  simd:
    name: SIMD cross-target parity (FR-7.4 / NFR-14/15)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: clippy (simd, warnings are errors)
        run: cargo clippy -p tte-core --all-targets --features simd -- -D warnings
      - name: Byte-identical on AVX2 (host default)
        run: cargo test -p tte-core --features simd
      - name: Byte-identical on the SSE2 baseline (no AVX/AVX2/FMA)
        run: cargo test -p tte-core --features simd
        env:
          RUSTFLAGS: "-C target-feature=-avx,-avx2,-fma"
      - name: wasm simd128 builds (W5)
        run: cargo build -p tte-core --no-default-features --features simd --target wasm32-unknown-unknown
        env:
          RUSTFLAGS: "-C target-feature=+simd128"

  iai:
    name: Instruction-count gate (FR-7.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - uses: taiki-e/install-action@v2
        with:
          # Must match the iai-callgrind dev-dependency version (Cargo.lock).
          tool: iai-callgrind-runner@0.16.1
      - name: Deterministic instruction counts — scalar, then simd vs scalar
        run: |
          cargo bench -p tte-core --no-default-features --bench iai_geom
          cargo bench -p tte-core --no-default-features --features simd --bench iai_geom

  demo-smoke:
    name: Demo smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.123,wasm-opt
      - name: Build wasm + bindings
        run: ./web/build.sh
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Adaptive-resolution policy unit test (FR-10.3)
        run: node scripts/adaptive.test.mjs
      - name: Install Playwright + Chromium
        working-directory: scripts
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Serve web/ and smoke-test the demo boots (presenters × wasm variants)
        run: |
          (cd web && python3 -m http.server 8000 >/dev/null 2>&1 &)
          node scripts/smoke.mjs                                   # WebGL2 + SIMD
          SMOKE_URL='http://localhost:8000/?nosimd' node scripts/smoke.mjs  # FR-9.3 scalar fallback
          SMOKE_URL='http://localhost:8000/?nogl' node scripts/smoke.mjs    # NFR-23 Canvas2D fallback
      - name: Presenter pixel-parity (FR-10.1 / NFR-22)
        run: node scripts/pixel-parity.mjs
      - name: WebGL presenter parity (FR-11.2 / NFR-23)
        run: node scripts/webgl-parity.mjs
      - name: DPR cap on a retina viewport (FR-10.2)
        run: node scripts/dpr-cap.mjs

  deny:
    name: Dependency vetting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
