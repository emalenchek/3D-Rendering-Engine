# CI gate sequence — see docs/02-test-harness.md §CI for rationale.
# Gates run fastest-first: fmt -> clippy -> tests (nextest) -> doctests -> deny.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Snapshot tests must fail in CI if output drifts; never write .snap.new noise.
  INSTA_UPDATE: "no"

jobs:
  lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The core must stay portable (terminal frontend targets all three).
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Tests (unit + integration + e2e)
        run: cargo nextest run --workspace
      - name: Doctests (nextest does not run these)
        run: cargo test --workspace --doc

  deny:
    name: Dependency vetting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
